name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'chapters/**'
      - 'metadata.yaml'
      - 'assets/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read metadata
        id: meta
        run: |
          pip install pyyaml -q
          python3 - <<'EOF'
          import yaml, os
          with open("metadata.yaml") as f:
              data = yaml.safe_load(f)
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"title={data.get('title', 'book')}\n")
              out.write(f"cover={data.get('cover-image', '')}\n")
          EOF

      - name: Assemble book.md
        run: |
          python3 - <<'EOF'
          import os, glob
          files = sorted(glob.glob("chapters/**/*.md", recursive=True))
          with open("book.md", "w", encoding="utf-8") as out:
              for i, f in enumerate(files):
                  with open(f, encoding="utf-8") as inp:
                      out.write(inp.read())
                  out.write("\n\n")
          print(f"Assembled {len(files)} files into book.md")
          EOF

      - name: Build EPUB
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --toc --toc-depth=2
            --output=1c-metadata-tree-book.epub

      - name: Build FB2
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --output=1c-metadata-tree-book.fb2
            -t fb2

      - name: Build HTML
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --toc --toc-depth=2
            --standalone
            --output=1c-metadata-tree-book.html

      - name: Build DOCX
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --toc --toc-depth=2
            --output=1c-metadata-tree-book.docx

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Черновик книги
          tag_name: draft-${{ github.run_id }}
          draft: true
          files: |
            1c-metadata-tree-book.epub
            1c-metadata-tree-book.fb2
            1c-metadata-tree-book.html
            1c-metadata-tree-book.docx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
